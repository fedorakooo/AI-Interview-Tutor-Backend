apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-tutor
      app.kubernetes.io/component: localstack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-tutor
        app.kubernetes.io/component: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:2.1
          ports:
            - containerPort: 4566
              name: http
          env:
            - name: SERVICES
              value: s3
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_REGION_NAME
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_BUCKET_NAME
            - name: S3_REGION_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_REGION_NAME
            - name: PERSISTENCE
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/localstack
            - name: init-scripts
              mountPath: /etc/localstack/init/ready.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: localstack-data
        - name: init-scripts
          configMap:
            name: localstack-init
            defaultMode: 0755
