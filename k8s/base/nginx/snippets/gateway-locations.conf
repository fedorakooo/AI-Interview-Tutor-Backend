location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","component":"nginx-gateway"}';
}

location = /nginx_status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    deny all;
}

location /api/v1/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;

    proxy_pass http://user_management;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location /api/v1/user/ {
    proxy_pass http://user_management;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location /api/v1/users {
    proxy_pass http://user_management;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location /api/v1/interview/ws/ {
    proxy_pass http://interview_service;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}

location /api/v1/interview/ {
    proxy_pass http://interview_service;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location = /api/v1/practice/plans {
    limit_req zone=practice_limit burst=3 nodelay;

    proxy_pass http://practice_service;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location /api/v1/practice/ {
    proxy_pass http://practice_service;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_set_header Authorization $http_authorization;
}

location /static/ {
    proxy_pass http://interview_service;
    include /etc/nginx/snippets/proxy-params.conf;
}

location = / {
    proxy_pass http://interview_service/;
    include /etc/nginx/snippets/proxy-params.conf;
}
