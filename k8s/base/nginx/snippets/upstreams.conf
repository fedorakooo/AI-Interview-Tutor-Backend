upstream user_management {
    server user-management:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream interview_service {
    ip_hash;
    server interview-service:8001 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

upstream practice_service {
    server practice-service:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}
