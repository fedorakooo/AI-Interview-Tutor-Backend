apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-tutor
      app.kubernetes.io/component: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-tutor
        app.kubernetes.io/component: notification-service
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done
      containers:
        - name: notification-service
          image: ai-interview-tutor/notification-service:latest
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
