apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-service
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: interview-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-tutor
      app.kubernetes.io/component: interview-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-tutor
        app.kubernetes.io/component: interview-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
      containers:
        - name: interview-service
          image: ai-interview-tutor/interview-service:latest
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POSTGRES_CHECKPOINT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_CHECKPOINT_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
