apiVersion: apps/v1
kind: Deployment
metadata:
  name: practice-service
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: practice-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-tutor
      app.kubernetes.io/component: practice-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-tutor
        app.kubernetes.io/component: practice-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
      containers:
        - name: practice-service
          image: ai-interview-tutor/practice-service:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
