apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-tutor
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-tutor
        app.kubernetes.io/component: nginx
    spec:
      initContainers:
        - name: wait-for-user-management
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://user-management:8000/health; do echo waiting for user-management; sleep 2; done
        - name: wait-for-interview-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://interview-service:8001/health/ready; do echo waiting for interview-service; sleep 2; done
        - name: wait-for-practice-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://practice-service:8000/health; do echo waiting for practice-service; sleep 2; done
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
