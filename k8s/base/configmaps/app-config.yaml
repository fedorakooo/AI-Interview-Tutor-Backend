apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app.kubernetes.io/name: ai-interview-tutor
data:
  POSTGRES_USER: postgres
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_NAME: user_management

  POSTGRES_CHECKPOINT_HOST: postgres
  POSTGRES_CHECKPOINT_PORT: "5432"
  POSTGRES_CHECKPOINT_USER: postgres
  POSTGRES_CHECKPOINT_NAME: interview

  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_USER: app
  REDIS_SESSION_TTL_SECONDS: "7200"

  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: guest
  RABBITMQ_TIMEOUT: "60"
  RABBITMQ_CV_ANALYZER_QUEUE_NAME: cv-analyze-stream
  RABBITMQ_CV_ANALYSIS_RESULTS_QUEUE_NAME: cv-analysis-results
  RABBITMQ_RESET_PASSWORD_QUEUE_NAME: reset-password-stream
  RABBITMQ_RESET_PASSWORD_DLQ_QUEUE_NAME: reset-password-stream.dlq
  RABBITMQ_PRACTICE_PLAN_QUEUE_NAME: practice-plan-stream
  RABBITMQ_PRACTICE_PLAN_DLQ_QUEUE_NAME: practice-plan-stream.dlq
  RABBITMQ_INTERVIEW_COMPLETED_QUEUE_NAME: interview-completed-stream
  RABBITMQ_INTERVIEW_COMPLETED_DLQ_QUEUE_NAME: interview-completed-stream.dlq
  RABBITMQ_PRACTICE_PLAN_READY_QUEUE_NAME: practice-plan-ready-stream

  MONGODB_HOST: mongodb
  MONGODB_PORT: "27017"
  MONGODB_USER: app
  MONGODB_DB_NAME: ai_interview
  MONGODB_AUTH_SOURCE: ai_interview
  MONGODB_CV_ANALYSIS_COLLECTION_NAME: cv_analysis
  MONGODB_MESSAGES_COLLECTION_NAME: messages
  MONGODB_CV_USER_ID_FIELD: user_id
  MONGODB_INTERVIEW_SESSIONS_COLLECTION_NAME: interview_sessions
  MONGODB_ROOT_USER: root

  S3_ENDPOINT_URL: http://localstack:4566
  S3_BUCKET_NAME: cv-uploads
  S3_REGION_NAME: us-east-1
  S3_CV_MAX_UPLOAD_BYTES: "10485760"

  FRONTEND_RESET_PASSWORD_URL: http://localhost:3000/reset-password

  ENVIRONMENT: development
  DEBUG: "true"
  ALLOW_SAMPLE_CV_FALLBACK: "true"
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost

  LLM_PROVIDER: openai
  OPENAI_LLM__MODEL: gpt-4o-mini
  OPENAI_LLM__TEMPERATURE: "0.6"
  OPENROUTER_LLM__MODEL: openai/gpt-4o-mini
  OPENROUTER_LLM__API_BASE: https://openrouter.ai/api/v1
  OPENROUTER_LLM__TEMPERATURE: "0.6"
  GOOGLE_LLM__MODEL: gemini-2.0-flash
  GOOGLE_LLM__TEMPERATURE: "0.6"
  INTERVIEW_LLM__TEMPERATURE: "0.6"
  ANALYZE_LLM__TEMPERATURE: "0.2"
  PRACTICE_LLM_TEMPERATURE: "0.5"

  INTERVIEW_SERVICE_PORT: "8001"

  DOCLING_DO_OCR: "true"
  DOCLING_DO_TABLE_STRUCTURE: "true"

  SES_AWS_REGION: us-east-1
  SES_SENDER_EMAIL: noreply@example.com
