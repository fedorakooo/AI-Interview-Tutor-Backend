apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    app.kubernetes.io/name: ai-interview-tutor
    app.kubernetes.io/component: postgres
data:
  02-create-interview-db.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 'CREATE DATABASE interview'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'interview')\gexec
    EOSQL
