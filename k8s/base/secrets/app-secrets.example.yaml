# Template for application secrets.
# Copy to overlays/<env>/app-secrets.yaml, fill in values, and add to kustomization resources.
#
#   cp k8s/base/secrets/app-secrets.example.yaml k8s/overlays/dev/app-secrets.yaml
#
# For local dev you can also use the pre-filled overlays/dev/app-secrets.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  labels:
    app.kubernetes.io/name: ai-interview-tutor
type: Opaque
stringData:
  POSTGRES_USER: CHANGE_ME
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_CHECKPOINT_PASSWORD: CHANGE_ME

  REDIS_PASSWORD: CHANGE_ME
  REDIS_USER_PASSWORD: CHANGE_ME

  RABBITMQ_PASSWORD: CHANGE_ME

  MONGODB_PASSWORD: CHANGE_ME
  MONGODB_ROOT_PASSWORD: CHANGE_ME

  PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    CHANGE_ME
    -----END PUBLIC KEY-----
  PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    CHANGE_ME
    -----END PRIVATE KEY-----

  S3_ACCESS_KEY: CHANGE_ME
  S3_SECRET_ACCESS_KEY: CHANGE_ME

  OPENAI_API_KEY: CHANGE_ME
  OPENROUTER_API_KEY: CHANGE_ME
  GOOGLE_API_KEY: CHANGE_ME

  SES_AWS_ACCESS_KEY: CHANGE_ME
  SES_AWS_SECRET_ACCESS_KEY: CHANGE_ME
