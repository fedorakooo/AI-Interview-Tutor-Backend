name: CI

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches:
      - dev
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.1.3"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${POETRY_VERSION}"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-root-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-root-

      - name: Install root dev dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files

  unit-tests:
    name: Unit tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: shared-models
            working-directory: libs/shared_models
            pytest-args: tests
          - name: user-management
            working-directory: user-management-service
            pytest-args: tests/unit_tests
          - name: interview
            working-directory: interview-service
            pytest-args: tests/unit_tests
          - name: analyze
            working-directory: analyze-service
            pytest-args: tests/unit_tests
          - name: notification
            working-directory: notification-service
            pytest-args: tests/unit_tests
          - name: practice
            working-directory: practice-service
            pytest-args: tests/unit_tests tests/integration_tests
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${POETRY_VERSION}"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ${{ matrix.working-directory }}/.venv
          key: poetry-${{ matrix.name }}-${{ hashFiles(format('{0}/poetry.lock', matrix.working-directory)) }}
          restore-keys: |
            poetry-${{ matrix.name }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run tests
        env:
          PUBLIC_KEY: ${{ secrets.CI_PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.CI_PRIVATE_KEY }}
        run: |
          if [ -z "${PUBLIC_KEY}" ]; then
            export PUBLIC_KEY="$(cat "${GITHUB_WORKSPACE}/tests/fixtures/dev_rsa_public.pem")"
            export PRIVATE_KEY="$(cat "${GITHUB_WORKSPACE}/tests/fixtures/dev_rsa_private.pem")"
          fi
          poetry run pytest ${{ matrix.pytest-args }} -q

  integration-tests:
    name: Integration tests (user-management)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: user_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d user_management"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4.1-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: user-management-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${POETRY_VERSION}"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            user-management-service/.venv
          key: poetry-user-management-integration-${{ hashFiles('user-management-service/poetry.lock') }}
          restore-keys: |
            poetry-user-management-integration-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_NAME: user_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          REDIS_USER: default
          REDIS_USER_PASSWORD: ""
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          PUBLIC_KEY: ${{ secrets.CI_PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.CI_PRIVATE_KEY }}
        run: |
          if [ -z "${PUBLIC_KEY}" ]; then
            export PUBLIC_KEY="$(cat "${GITHUB_WORKSPACE}/tests/fixtures/dev_rsa_public.pem")"
            export PRIVATE_KEY="$(cat "${GITHUB_WORKSPACE}/tests/fixtures/dev_rsa_private.pem")"
          fi
          poetry run pytest tests/integration_tests -q

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-management-service
          - interview-service
          - analyze-service
          - notification-service
          - practice-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          tags: ai-interview-tutor/${{ matrix.service }}:ci
          # Per-service scope avoids cross-matrix cache collisions; ignore-error
          # prevents BlobNotFound flakiness from stale GHA cache entries.
          cache-from: type=gha,scope=${{ matrix.service }},ignore-error=true
          cache-to: type=gha,mode=max,scope=${{ matrix.service }},ignore-error=true
